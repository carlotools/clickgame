<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.createjs.com/1.0.0/soundjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.2.1/jsencrypt.min.js"></script>
    <script src="game.js" defer></script>
</head>
<body onload="init()">
    <div id="welcome">
        <h1>Welcome</h1>
        <button onclick="readyBtn()" class="start_btn">Start</button>
        <p>Mode: <span id="mode"></span></p>
    </div>

    <div id="gameBody"></div>

    <div id="GameScoreLayer" class="SHADE">
        <div id="GameScoreLayer-text"></div>
        <div id="cps"></div>
        <div id="score"></div>
        <div id="best"></div>
        <button id="replay" onclick="replayBtn()">Replay</button>
        <button onclick="backBtn()">Return</button>
    </div>

    <!-- Optional hidden inputs for images -->
    <input type="file" id="click-before-image" style="display:none" onchange="saveClickBeforeImage()">
    <input type="file" id="click-after-image" style="display:none" onchange="saveClickAfterImage()">
</body>
</html>
