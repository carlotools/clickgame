<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottom-Tap Tile Game</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  text-align:center;
}#topbar {
position:fixed;
top:10px;
right:15px;
font-weight:bold;
z-index:10;
}

.screen { display:none; }
.active { display:block; }

button {
padding:12px 20px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

#gameArea {
position:relative;
width:100%;
height:70vh;
margin-top:20px;
overflow:hidden;
border:1px solid #ccc;
background:#fff;
}

.tile {
position:absolute;
width:60px;
height:60px;
border-radius:8px;
background:#4CAF50;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:20px;
}
</style>

</head>
<body><div id="topbar">Coins: <span id="coins">0</span></div><!-- HOME --><div id="home" class="screen active">
  <h1>Bottom-Tap Tiles</h1>
  <button onclick="goPlay()">Play</button>
  <button onclick="goStore()">Store</button>
  <button onclick="goInfo()">Info</button>
</div><!-- INFO --><div id="info" class="screen">
  <h2>Info</h2>
  <p>Co-owner: Adrian</p>
  <p>Owner: Carlo</p>
  <button onclick="goHome()">Return</button>
</div><!-- STORE --><div id="store" class="screen">
  <h2>Store</h2>
  <p>Hard Mode (100 coins)</p>
  <button onclick="buyHard()">Buy</button>
  <p id="ownedHard"></p>
  <button onclick="goHome()">Return</button>
</div><!-- PLAY --><div id="play" class="screen">
  <h2>Select Mode</h2>
  <button onclick="startGame('normal')">Normal</button>
  <button onclick="startGame('hard')">Hard</button>
  <button onclick="goHome()">Return</button>
</div><!-- GAME --><div id="game" class="screen">
  <h2 id="status">Get Ready</h2>
  <p>Time: <span id="time">25</span> | Score: <span id="score">0</span></p>
  <div id="gameArea"></div>
</div><!-- RESULT --><div id="result" class="screen">
  <h2 id="resultText"></h2>
  <p id="scoreText"></p>
  <button onclick="goHome()">Return</button>
  <button onclick="goPlay()">Again</button>
</div><script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let hardOwned = localStorage.getItem("hardOwned") === "true";
document.getElementById("coins").innerText = coins;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){ show("home"); }
function goInfo(){ show("info"); }
function goStore(){
  document.getElementById("ownedHard").innerText = hardOwned ? "Owned ✅" : "Not Owned";
  show("store");
}
function goPlay(){ show("play"); }

function buyHard(){
  if(coins >= 100){
    coins -= 100;
    hardOwned = true;
    localStorage.setItem("hardOwned", true);
    updateCoins();
    alert("Bought Hard Mode!");
  } else alert("Not enough coins!");
}

function updateCoins(){
  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = coins;
}

// Game variables
let timer, timeLeft, score, tileCount, tiles=[];
let mode;
const gameArea = document.getElementById("gameArea");

function startGame(selectedMode){
  mode = selectedMode;
  if(mode==="hard" && !hardOwned){ alert("Buy Hard Mode first!"); return; }

  show("game");
  score = 0;
  timeLeft = 25;
  tileCount = mode==="hard" ? 8 : 5;
  tiles = [];
  document.getElementById("score").innerText = score;

  let countdown = 3;
  document.getElementById("status").innerText = "Starting in " + countdown;
  gameArea.innerHTML = "";

  let c = setInterval(()=>{
    countdown--;
    document.getElementById("status").innerText = "Starting in " + countdown;
    if(countdown<=0){
      clearInterval(c);
      runGame();
    }
  },1000);
}

function runGame(){
  document.getElementById("status").innerText = "";
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
    if(timeLeft<=0) endGame(true);
  },1000);
  spawnTiles();
}

function spawnTiles(){
  gameArea.innerHTML = "";
  tiles = [];

  for(let i=0;i<tileCount;i++){
    let tile = document.createElement("div");
    tile.classList.add("tile");

    // random position
    let x = Math.random()*(gameArea.clientWidth-60);
    let y = Math.random()*(gameArea.clientHeight-60);
    tile.style.left = x + "px";
    tile.style.top = y + "px";

    tile.innerText = score + i + 1;

    tile.addEventListener("click", ()=>{
      // check bottom-most
      let bottomY = Math.max(...tiles.map(t=>t.offsetTop));
      if(tile.offsetTop < bottomY) return endGame(false);

      // correct tap
      score++;
      document.getElementById("score").innerText = score;

      // remove tapped tile
      tiles = tiles.filter(t=>t!==tile);
      spawnTiles(); // next tiles
    });

    gameArea.appendChild(tile);
    tiles.push(tile);
  }
}

function endGame(win){
  clearInterval(timer);
  show("result");
  let speed = (score/25).toFixed(2);

  if(win){
    let earned = Math.floor(score*1.5);
    coins += earned;
    updateCoins();
    document.getElementById("resultText").innerText = "You Survived!";
    document.getElementById("scoreText").innerText = "Score: " + score + " | Speed: " + speed + " | Coins +" + earned;
  } else {
    document.getElementById("resultText").innerText = "Game Over!";
    document.getElementById("scoreText").innerText = "Score: " + score + " | Speed: " + speed;
  }
}
</script></body>
</html>
