<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Click Game</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  font-size: 16px;
}
button:hover { background:#2563eb; }#topbar {
position:absolute;
top:10px;
right:20px;
}

.screen { display:none; }
.active { display:block; }

.grid {
display:grid;
grid-template-columns: repeat(4, 1fr);
gap:10px;
width:300px;
margin:20px auto;
}

.card {
width:70px;
height:70px;
background-size: cover;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}
.card:hover { border:2px solid white; }
</style>

</head><body><div id="topbar">Coins: <span id="coins">0</span></div><!-- HOME --><div id="home" class="screen active">
  <h1>Anime Click Game</h1>
  <button onclick="goPlay()">Play</button>
  <button onclick="goStore()">Store</button>
  <button onclick="goInfo()">Info</button>
</div><!-- INFO --><div id="info" class="screen">
  <h2>Info</h2>
  <p>Co-owner: Adrian</p>
  <p>Owner: Carlo</p>
  <button onclick="goHome()">Return</button>
</div><!-- STORE --><div id="store" class="screen">
  <h2>Store</h2>
  <p>Hard Mode (Cost: 50 coins)</p>
  <button onclick="buyHard()">Buy</button>
  <p id="ownedHard"></p>
  <button onclick="goHome()">Return</button>
</div><!-- PLAY --><div id="play" class="screen">
  <h2>Select Mode</h2>
  <button onclick="startGame('normal')">Normal</button>
  <button onclick="startGame('hard')">Hard</button>
  <button onclick="goHome()">Return</button>
</div><!-- GAME --><div id="game" class="screen">
  <h2 id="status">Get Ready</h2>
  <p>Time: <span id="time">25</span></p>
  <div class="grid" id="grid"></div>
</div><!-- RESULT --><div id="result" class="screen">
  <h2 id="resultText"></h2>
  <p id="scoreText"></p>
  <button onclick="goHome()">Return</button>
  <button onclick="goPlay()">Again</button>
</div><script>
let coins = localStorage.getItem("coins") || 0;
let hardOwned = localStorage.getItem("hardOwned") === "true";

document.getElementById("coins").innerText = coins;

function clickSound() {
  let audio = new Audio("https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3");
  audio.play();
}

function show(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){ clickSound(); show("home"); }
function goInfo(){ clickSound(); show("info"); }
function goStore(){
  clickSound();
  document.getElementById("ownedHard").innerText = hardOwned ? "Owned ✅" : "Not Owned";
  show("store");
}
function goPlay(){ clickSound(); show("play"); }

function buyHard(){
  if(coins >= 50){
    coins -= 50;
    hardOwned = true;
    localStorage.setItem("hardOwned", true);
    updateCoins();
    alert("Bought Hard Mode!");
  } else {
    alert("Not enough coins!");
  }
}

function updateCoins(){
  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = coins;
}

let timer, timeLeft, score;

function startGame(mode){
  if(mode==="hard" && !hardOwned){
    alert("Buy Hard Mode first!");
    return;
  }

  clickSound();
  show("game");
  score = 0;
  timeLeft = 25;

  let countdown = 5;
  document.getElementById("status").innerText = "Starting in " + countdown;

  let c = setInterval(()=>{
    countdown--;
    document.getElementById("status").innerText = "Starting in " + countdown;
    if(countdown<=0){
      clearInterval(c);
      runGame(mode);
    }
  },1000);
}

function runGame(mode){
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
    if(timeLeft<=0){
      endGame(true);
    }
  },1000);

  spawn(mode);
}

function spawn(mode){
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  let total = mode==="hard" ? 12 : 8;
  let correctIndex = Math.floor(Math.random()*total);

  for(let i=0;i<total;i++){
    let div = document.createElement("div");
    div.className = "card";

    if(i===correctIndex){
      div.style.backgroundImage = "url('https://i.imgur.com/1X6bK6k.png')";
      div.onclick = ()=>{
        clickSound();
        score++;
        spawn(mode);
      }
    } else {
      div.style.backgroundImage = "url('https://i.imgur.com/Z6XbK6k.png')";
      div.onclick = ()=>{
        clickSound();
        endGame(false);
      }
    }

    grid.appendChild(div);
  }
}

function endGame(win){
  clearInterval(timer);
  show("result");

  let speed = score / 25;

  if(win){
    let earned = Math.floor(score * 2);
    coins += earned;
    updateCoins();
    document.getElementById("resultText").innerText = "Time Up!";
    document.getElementById("scoreText").innerText =
      "Score: " + score + " | Speed: " + speed.toFixed(2) + " | Coins +" + earned;
  } else {
    document.getElementById("resultText").innerText = "You Lost!";
    document.getElementById("scoreText").innerText =
      "Score: " + score + " | Speed: " + speed.toFixed(2);
  }
}
</script></body>
</html>
