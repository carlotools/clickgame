<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottom-Tap Magic Tiles</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  text-align:center;
}#topbar {
position:fixed;
top:10px;
right:15px;
font-weight:bold;
z-index:10;
}

.screen { display:none; }
.active { display:block; }

button {
padding:12px 20px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

.grid {
display:grid;
grid-template-columns: repeat(5, 1fr);
gap:5px;
max-width:400px;
margin:20px auto;
}

.tile {
height:60px;
border-radius:5px;
background:#ddd;
}
.tile.correct { background:#4CAF50; }
.tile.bottom { border:2px solid #000; }
</style>

</head>
<body><div id="topbar">Coins: <span id="coins">0</span></div><!-- HOME --><div id="home" class="screen active">
  <h1>Bottom-Tap Tiles</h1>
  <button onclick="goPlay()">Play</button>
  <button onclick="goStore()">Store</button>
  <button onclick="goInfo()">Info</button>
</div><!-- INFO --><div id="info" class="screen">
  <h2>Info</h2>
  <p>Co-owner: Adrian</p>
  <p>Owner: Carlo</p>
  <button onclick="goHome()">Return</button>
</div><!-- STORE --><div id="store" class="screen">
  <h2>Store</h2>
  <p>Hard Mode (100 coins)</p>
  <button onclick="buyHard()">Buy</button>
  <p id="ownedHard"></p>
  <button onclick="goHome()">Return</button>
</div><!-- PLAY --><div id="play" class="screen">
  <h2>Select Mode</h2>
  <button onclick="startGame('normal')">Normal</button>
  <button onclick="startGame('hard')">Hard</button>
  <button onclick="goHome()">Return</button>
</div><!-- GAME --><div id="game" class="screen">
  <h2 id="status">Get Ready</h2>
  <p>Time: <span id="time">25</span> | Score: <span id="score">0</span></p>
  <div class="grid" id="grid"></div>
</div><!-- RESULT --><div id="result" class="screen">
  <h2 id="resultText"></h2>
  <p id="scoreText"></p>
  <button onclick="goHome()">Return</button>
  <button onclick="goPlay()">Again</button>
</div><script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let hardOwned = localStorage.getItem("hardOwned") === "true";
document.getElementById("coins").innerText = coins;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){ show("home"); }
function goInfo(){ show("info"); }
function goStore(){
  document.getElementById("ownedHard").innerText = hardOwned ? "Owned ✅" : "Not Owned";
  show("store");
}
function goPlay(){ show("play"); }

function buyHard(){
  if(coins >= 100){
    coins -= 100;
    hardOwned = true;
    localStorage.setItem("hardOwned", true);
    updateCoins();
    alert("Bought Hard Mode!");
  } else alert("Not enough coins!");
}

function updateCoins(){
  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = coins;
}

// Game variables
let timer, timeLeft, score, gridRows, mode;
const cols = 5;

function startGame(selectedMode){
  mode = selectedMode;
  if(mode==="hard" && !hardOwned){ alert("Buy Hard Mode first!"); return; }

  show("game");
  score = 0;
  timeLeft = 25;
  gridRows = 5;

  document.getElementById("score").innerText = score;

  let countdown = 3;
  document.getElementById("status").innerText = "Starting in " + countdown;

  let c = setInterval(()=>{
    countdown--;
    document.getElementById("status").innerText = "Starting in " + countdown;
    if(countdown<=0){
      clearInterval(c);
      runGame();
    }
  },1000);
}

function runGame(){
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
    if(timeLeft<=0) endGame(true);
  },1000);
  spawnGrid();
}

function spawnGrid(){
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  // Number of rows
  let rows = gridRows;
  let totalTiles = rows * cols;

  // Random bottom row tile positions
  let bottomRow = rows-1;
  let correctTileIndex = Math.floor(Math.random()*cols);

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      let tile = document.createElement("div");
      tile.classList.add("tile");
      if(r===bottomRow) tile.classList.add("bottom");
      if(r===bottomRow && c===correctTileIndex) tile.dataset.correct = "true";

      tile.addEventListener("click", ()=>{
        if(r!==bottomRow) return endGame(false); // clicked above bottom row = lose
        if(tile.dataset.correct==="true"){
          score++;
          document.getElementById("score").innerText = score;
          spawnGrid(); // next tiles
        } else {
          endGame(false);
        }
      });

      grid.appendChild(tile);
    }
  }
}

function endGame(win){
  clearInterval(timer);
  show("result");

  let speed = (score / 25).toFixed(2);

  if(win){
    let earned = Math.floor(score*1.5);
    coins += earned;
    updateCoins();
    document.getElementById("resultText").innerText = "You Survived!";
    document.getElementById("scoreText").innerText = "Score: " + score + " | Speed: " + speed + " | Coins +" + earned;
  } else {
    document.getElementById("resultText").innerText = "Game Over!";
    document.getElementById("scoreText").innerText = "Score: " + score + " | Speed: " + speed;
  }
}
</script></body>
</html>
