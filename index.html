<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Grid Game</title><style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
  text-align:center;
}

button {
  padding:12px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  font-size:16px;
}

#topbar {
  position:absolute;
  top:10px;
  right:15px;
  font-weight:bold;
}

.screen { display:none; }
.active { display:block; }

.grid {
  display:grid;
  grid-template-columns: repeat(10, 1fr);
  gap:5px;
  padding:10px;
}

.tile {
  height:40px;
  background:#ddd;
  border-radius:5px;
}

.correct {
  background:#4CAF50 !important;
}

</style></head><body><div id="topbar">Coins: <span id="coins">0</span></div><!-- HOME --><div id="home" class="screen active">
  <h1>Tap Grid</h1>
  <button onclick="goPlay()">Play</button>
  <button onclick="goStore()">Store</button>
  <button onclick="goInfo()">Info</button>
</div><!-- INFO --><div id="info" class="screen">
  <h2>Info</h2>
  <p>Co-owner: Adrian</p>
  <p>Owner: Carlo</p>
  <button onclick="goHome()">Return</button>
</div><!-- STORE --><div id="store" class="screen">
  <h2>Store</h2>
  <p>Hard Mode (100 coins)</p>
  <button onclick="buyHard()">Buy</button>
  <p id="ownedHard"></p>
  <button onclick="goHome()">Return</button>
</div><!-- PLAY --><div id="play" class="screen">
  <h2>Select Mode</h2>
  <button onclick="startGame('normal')">Normal</button>
  <button onclick="startGame('hard')">Hard</button>
  <button onclick="goHome()">Return</button>
</div><!-- GAME --><div id="game" class="screen">
  <h2 id="status">Get Ready</h2>
  <p>Time: <span id="time">25</span></p>
  <div class="grid" id="grid"></div>
</div><!-- RESULT --><div id="result" class="screen">
  <h2 id="resultText"></h2>
  <p id="scoreText"></p>
  <button onclick="goHome()">Return</button>
  <button onclick="goPlay()">Again</button>
</div><script>
let coins = localStorage.getItem("coins") || 0;
let hardOwned = localStorage.getItem("hardOwned") === "true";

document.getElementById("coins").innerText = coins;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goHome(){ show("home"); }
function goInfo(){ show("info"); }
function goStore(){
  document.getElementById("ownedHard").innerText = hardOwned ? "Owned ✅" : "Not Owned";
  show("store");
}
function goPlay(){ show("play"); }

function buyHard(){
  if(coins >= 100){
    coins -= 100;
    hardOwned = true;
    localStorage.setItem("hardOwned", true);
    updateCoins();
    alert("Bought Hard Mode!");
  } else {
    alert("Not enough coins!");
  }
}

function updateCoins(){
  localStorage.setItem("coins", coins);
  document.getElementById("coins").innerText = coins;
}

let timer, timeLeft, score, currentCorrect;

function startGame(mode){
  if(mode==="hard" && !hardOwned){
    alert("Buy Hard Mode first!");
    return;
  }

  show("game");
  score = 0;
  timeLeft = 25;

  let countdown = 3;
  document.getElementById("status").innerText = "Starting in " + countdown;

  let c = setInterval(()=>{
    countdown--;
    document.getElementById("status").innerText = "Starting in " + countdown;
    if(countdown<=0){
      clearInterval(c);
      runGame(mode);
    }
  },1000);
}

function runGame(mode){
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if(timeLeft<=0){
      endGame(true);
    }
  },1000);

  spawn(mode);
}

function spawn(mode){
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  let total = mode==="hard" ? 120 : 100;
  currentCorrect = Math.floor(Math.random()*total);

  for(let i=0;i<total;i++){
    let div = document.createElement("div");
    div.className = "tile";

    if(i===currentCorrect){
      div.classList.add("correct");
    }

    div.onclick = ()=>{
      if(i === currentCorrect){
        score++;
        spawn(mode);
      } else {
        endGame(false);
      }
    }

    grid.appendChild(div);
  }
}

function endGame(win){
  clearInterval(timer);
  show("result");

  let speed = score / 25;

  if(win){
    let earned = Math.floor(score * 1.5);
    coins += earned;
    updateCoins();

    document.getElementById("resultText").innerText = "You Survived!";
    document.getElementById("scoreText").innerText =
      "Score: " + score + " | Speed: " + speed.toFixed(2) + " | Coins +" + earned;
  } else {
    document.getElementById("resultText").innerText = "You Missed!";
    document.getElementById("scoreText").innerText =
      "Score: " + score + " | Speed: " + speed.toFixed(2);
  }
}
</script></body>
</html>
